site_name: dirplot
site_description: Nested treemap visualizations for directory trees and archives
site_url: https://deeplook.github.io/dirplot
repo_url: https://github.com/deeplook/dirplot
repo_name: deeplook/dirplot

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy

nav:
  - Home: index.md
  - Installation: installation.md
  - Examples: examples.md
  - Remote Sources: remote-sources.md
  - Archive Formats: archives.md
  - CLI Reference: cli.md
  - Python API: api.md
  - Guides: guides.md
  - Troubleshooting: troubleshooting.md


plugins:
  - search

markdown_extensions:
  - tables
  - fenced_code
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
